<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APT Controller Protocol Scanner (V3)</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px 10px; background-color: #f8f9fa; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h1 { color: #007bff; font-size: 20px; margin-bottom: 20px; }
        button { padding: 12px 24px; font-size: 15px; font-weight: bold; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 25px; width: 100%; margin-bottom: 10px; }
        #status { font-size: 14px; font-weight: bold; padding: 12px; border-radius: 8px; background: #e9ecef; color: #495057; margin-bottom: 20px; }
        .connected { color: #155724 !important; background: #d4edda !important; }
        .error { color: #721c24 !important; background: #f8d7da !important; }
        
        .cmd-grid { display: grid; grid-template-columns: 1px 1fr; gap: 8px; margin-top: 15px; display: none; }
        .cmd-btn { background-color: #28a745; border-radius: 8px; font-size: 13px; padding: 10px; margin: 0; width: auto; }
        .cmd-btn:hover { background-color: #218838; }
        
        #log { background: #121212; color: #00ff66; padding: 15px; border-radius: 10px; text-align: left; height: 280px; overflow-y: auto; font-family: monospace; font-size: 11px; margin-top: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .log-item { border-bottom: 1px solid #222; padding: 6px 0; word-break: break-all; }
        .send-msg { color: #ffcc00; }
    </style>
</head>
<body>

    <div class="container">
        <h1>เครื่องมือแสกนโปรโตคอล กล่อง APT</h1>
        <button id="connectBtn">🔗 ค้นหาและเชื่อมต่อบลูทูธ</button>
        <div id="status">สถานะ: ยังไม่ได้เชื่อมต่อ</div>
        
        <div id="cmdSection" class="cmd-grid">
            <button class="cmd-btn" onclick="sendHex([0x3A, 0x00, 0x0D, 0x0A])">ส่งคำสั่งสไตล์ APT (0x3A)</button>
            <button class="cmd-btn" onclick="sendHex([0x5A, 0x5A, 0x00, 0x00, 0x5A])">ส่งคำสั่งเปิดระบบ (0x5A)</button>
            <button class="cmd-btn" onclick="sendHex([0x68, 0x01, 0x00, 0x69])">ยิงคำสั่งเช็กสถานะ (0x68)</button>
            <button class="cmd-btn" onclick="sendHex([0xA5, 0xA5, 0x01, 0x01, 0x4C])">ส่ง Handshake จีน (0xA5)</button>
        </div>

        <div id="log">// ระบบพร้อมทำงาน...</div>
    </div>

    <script>
        // ใช้รหัสหลัก 0xFFE0 / 0xFFE1 จากภาพนิ่งแอปของคุณ
        const TARGET_SERVICE_UUID = 0xffe0;          
        const TARGET_CHARACTERISTIC_UUID = 0xffe1;   

        const connectBtn = document.getElementById('connectBtn');
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');
        const cmdSection = document.getElementById('cmdSection');

        let gCharacteristic = null;

        connectBtn.addEventListener('click', async () => {
            try {
                updateStatus("กำลังสแกนหาบลูทูธ...", "");
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [TARGET_SERVICE_UUID] }]
                });

                updateStatus("กำลังเชื่อมต่อกับกล่อง...", "");
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(TARGET_SERVICE_UUID);
                gCharacteristic = await service.getCharacteristic(TARGET_CHARACTERISTIC_UUID);

                updateStatus("เชื่อมต่อสำเร็จเรียบร้อย 🎉", "success");
                logDiv.innerHTML = '// เปิดระบบดักฟังข้อมูลแล้ว ให้ทดสอบกดปุ่มด้านบนด้านล่างทีละปุ่ม...\n';
                cmdSection.style.display = 'block'; 

                await gCharacteristic.startNotifications();
                gCharacteristic.addEventListener('characteristicvaluechanged', handleDataChanged);

                device.addEventListener('gattserverdisconnected', () => {
                    updateStatus("สัญญาณบลูทูธหลุดออกจากกล่อง!", "error");
                    cmdSection.style.display = 'none';
                });

            } catch (error) {
                console.error(error);
                updateStatus(`ผิดพลาด: ${error.message}`, "error");
            }
        });

        // ฟังก์ชันสั่งยิงรหัสคำสั่งออกจากเว็บไปหากล่อง
        async function sendHex(byteArray) {
            if (!gCharacteristic) return;
            try {
                const data = new Uint8Array(byteArray);
                await gCharacteristic.writeValue(data);
                printLog(`<span class="send-msg">👉 ยิงคำสั่งสำเร็จ: [${byteArray.map(x => '0x' + x.toString(16).toUpperCase()).join(', ')}]</span>`);
            } catch (error) {
                printLog(`❌ ส่งคำสั่งไม่ได้: ${error.message}`);
            }
        }

        // ฟังก์ชันเมื่อกล่องตื่นและยอมคุยตอบกลับมา
        function handleDataChanged(event) {
            const value = event.target.value;
            let rawBytes = [];
            for (let i = 0; i < value.byteLength; i++) {
                rawBytes.push(value.getUint8(i));
            }
            
            // แปลงเป็นเลขฐานสิบหกเพื่อให้ดูง่ายสไตล์นักพัฒนา
            let hexArray = rawBytes.map(b => '0x' + b.toString(16).toUpperCase().padStart(2, '0'));

            const time = new Date().toLocaleTimeString();
            printLog(`🚨 [${time}] กล่องตอบรับกลับมาแล้ว!!<br>└─ ข้อมูลฐาน 16: <b>[${hexArray.join(', ')}]</b><br>└─ ข้อมูลฐาน 10: [${rawBytes.join(', ')}]`);
        }

        function printLog(msg) {
            if(logDiv.innerText.startsWith('//')) logDiv.innerHTML = '';
            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = msg;
            logDiv.appendChild(item);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus(text, type) {
            statusDiv.innerText = "สถานะ: " + text;
            statusDiv.className = ""; 
            if (type === "success") statusDiv.classList.add('connected');
            if (type === "error") statusDiv.classList.add('error');
        }
    </script>
</body>
</html>
